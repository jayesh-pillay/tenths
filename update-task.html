<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tenth's - Update Task</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="create-task.css">
    <style>
        .btn-add-subject {
            background-color: #6C5248;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-top: 15px;
        }
        .btn-del-subject {
            background: #FFEBEB;
            color: #D34545;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="sidebar">
            <div class="sidebar-logo">Tenth's</div>
            <div class="user-profile">
                <div class="avatar" id="nav-avatar">U</div>
                <div class="user-info">
                    <div class="user-name" id="nav-name">Loading...</div>
                </div>
            </div>
            <div class="search-bar">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" placeholder="Search tasks...">
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">Dashboard</a>
                <a href="tasks.html" class="nav-item active">Tasks</a>
                <a href="analytics.html" class="nav-item">Analytics</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main ct-main-padding" style="overflow-y: auto;">
            <div id="error-container" style="color:red; font-weight:bold; display:none; margin-bottom: 20px;"></div>
            
            <div id="content-container" style="display:none;">
                <h1 class="ct-title">Update Task</h1>
                <p class="ct-subtitle">Modify your targets or adjust modules seamlessly.</p>

                <form id="update-task-form" class="ct-form-max-width">
                    <input type="hidden" id="task-id">
                    
                    <div class="ct-card">
                        <div class="ct-field-group">
                            <label class="ct-label">TASK HEADING</label>
                            <input type="text" id="task-heading" class="ct-input" required>
                        </div>
                        <div class="ct-field-group">
                            <label class="ct-label">DESCRIPTION</label>
                            <textarea id="task-description" class="ct-textarea" required></textarea>
                        </div>
                    </div>

                    <div class="ct-card">
                        <label class="ct-label" style="text-align: left; margin-bottom: 20px;">MODULE BREAKDOWN TARGETS</label>
                        <p style="font-size:0.8rem; color:#888;">Note: Changing targets dynamically changes your completion percentage.</p>
                        
                        <div id="breakdown-wrapper">
                            <!-- Populated dynamically via JS -->
                        </div>

                        <button type="button" class="btn-add-subject" id="btn-add-subject">+ Add Subject Module</button>
                    </div>

                    <div class="ct-card">
                        <div class="ct-field-group">
                            <label class="ct-label">DEADLINE DATE</label>
                            <input type="date" id="task-deadline" class="ct-input" required>
                        </div>
                    </div>

                    <div style="display: flex; gap: 20px;">
                        <button type="submit" class="btn-large-submit" id="submit-btn" style="width: 100%; max-width: 400px; background-color: #6C5248; color: white;">Save Updates</button>
                        <button type="button" class="btn-large-submit" id="cancel-btn" style="width: 100%; max-width: 200px; background-color: #f7f5f2; color: #111;">Cancel</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <script src="update-task.js"></script>
<script src="search.js"></script>
</body>
</html>
